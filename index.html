<style>
/* ════════════════════════════════════════════════════════════════
   DETROX — YAPAY ZEKÂ KOMUTA PANELİ v2  (derin çelik-mavi tema · Detrox marka mavisi)
   Gerçek logo · sesli Akıllı Asistan · RPA tiyatrosu · kamera/görü · aktif iç sayfalar
   ════════════════════════════════════════════════════════════════ */
:root{
  /* marka ana — Detrox mavisi (logodan) */
  --brand:#3f8cbf; --brand-d:#2f6f9c; --brand-dd:#235877; --brand-l:#6aa7d1; --brand-xl:#9ec6e2;
  --brand-bg:#e1eff8; --brand-soft:#eef6fc;
  /* ikincil — hijyen teal */
  --teal:#0e9ca5; --teal-d:#0a767d; --teal-bg:#e4f6f7;
  /* vurgu */
  --gold:#d99a1f; --gold-l:#f0b53e; --gold-bg:#fdf3df;
  --lime:#2bb673; --lime-l:#43d68c; --lime-bg:#e7f8f0;
  --cyan:#16b6e0; --violet:#7c6cf0; --coral:#ff6b5e; --amber:#f5a623; --rose:#e8527a;
  /* mürekkep (koyu değil, derin mavi-lacivert) */
  --ink:#0e3550; --ink2:#1d4a66; --soft:#587890; --muted:#8aa3b4; --faint:#b6c9d6;
  /* zemin (açık) */
  --bg:#bfd6e9; --bg2:#eaf2f9; --paper:#ffffff; --rail:#f4f9fd;
  --line:#d3e2ee; --line2:#c2d6e6;
  /* durum */
  --success:#1faa6a; --success-bg:#e7f7ef; --warning:#e08a1e; --warning-bg:#fdf2e0;
  --danger:#e0524a; --danger-bg:#fdecea; --info:#16b6e0; --info-bg:#e6f6fc;
  --sh-sm:0 1px 3px rgba(14,53,80,.06), 0 1px 2px rgba(14,53,80,.04);
  --sh:0 6px 22px rgba(14,53,80,.08), 0 2px 6px rgba(14,53,80,.05);
  --sh-lg:0 18px 48px rgba(14,53,80,.14), 0 6px 16px rgba(14,53,80,.08);
  --r:16px; --r-sm:11px; --r-lg:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
  background:
    radial-gradient(1250px 560px at 86% -10%, #a7c8e4 0%, rgba(167,200,228,0) 56%),
    radial-gradient(1000px 540px at 2% 3%, #b3d2cf 0%, rgba(179,210,207,0) 52%),
    linear-gradient(180deg, #c8dcec 0%, #bcd4e8 60%, #b6d0e6 100%);
  color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden;
}
.serif{font-family:'Fraunces',Georgia,serif}
.mono{font-family:'JetBrains Mono',monospace}
a{color:inherit;text-decoration:none}
::selection{background:var(--brand-xl);color:#063}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#9fc0da;border-radius:8px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--brand-l)}

/* DEMO ROZETİ */
.demo-badge{position:fixed;left:14px;bottom:14px;z-index:120;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--line2);
  box-shadow:var(--sh);border-radius:999px;padding:7px 14px 7px 11px;font-size:11.5px;color:var(--soft);font-weight:600}
.demo-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px var(--gold-bg);animation:pulse 2.4s infinite}
.demo-badge b{color:var(--ink2)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:90;background:rgba(255,255,255,.88);backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:1500px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:20px}
.brand{display:flex;align-items:center;gap:13px;cursor:pointer;flex-shrink:0}
.brand img.logo{height:42px;width:auto;display:block}
.brand .sep{width:1px;height:34px;background:var(--line2)}
.brand .badge-ai{display:flex;flex-direction:column;line-height:1.1}
.brand .badge-ai b{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:.2px}
.brand .badge-ai span{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--brand-d);font-weight:800;margin-top:2px}
.kpi-mini{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.kpi-mini .km{display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:6px 13px;min-width:82px}
.kpi-mini .km .l{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:700}
.kpi-mini .km .v{font-size:15px;font-weight:800;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-.3px}
.kpi-mini .km .v small{font-size:9.5px;color:var(--success);font-weight:700;margin-left:3px}
.kpi-mini .km .v small.dn{color:var(--danger)}
.top-actions{display:flex;align-items:center;gap:9px;flex-shrink:0}
.datechip{font-size:11px;color:var(--soft);font-weight:600;text-align:right;line-height:1.3}
.datechip b{color:var(--ink2);display:block;font-size:12px}
.sndbtn{display:flex;align-items:center;gap:7px;background:var(--paper);color:var(--soft);border:1px solid var(--line2);border-radius:11px;padding:8px 12px;font:inherit;font-weight:700;font-size:12px;cursor:pointer;transition:.18s}
.sndbtn.on{background:var(--lime-bg);color:var(--lime);border-color:var(--lime-l)}
.sndbtn:hover{border-color:var(--brand-l)}
.zeki-btn{display:flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--brand),var(--brand-dd));color:#fff;border:none;border-radius:12px;padding:9px 15px;font:inherit;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 6px 16px rgba(63,140,191,.32);transition:.2s}
.zeki-btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(63,140,191,.42)}
.zeki-btn .av{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:13px}
.zeki-btn .pulse-ring{width:8px;height:8px;border-radius:50%;background:var(--lime-l);box-shadow:0 0 0 0 rgba(67,214,140,.7);animation:ring 2s infinite}

/* ANA MENÜ */
.mainnav{position:sticky;top:64px;z-index:85;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.mainnav-in{max-width:1500px;margin:0 auto;padding:0 24px;display:flex;gap:1px;overflow-x:auto}
.mainnav-in::-webkit-scrollbar{height:0}
.navitem{position:relative;padding:13px 13px 12px;font-size:13px;font-weight:700;color:var(--soft);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:color .18s;border:none;background:none;font-family:inherit}
.navitem .ni-ic{font-size:15px;opacity:.85}
.navitem:hover{color:var(--brand-d)}
.navitem.active{color:var(--brand-d)}
.navitem.active::after{content:"";position:absolute;left:9px;right:9px;bottom:-1px;height:3px;border-radius:3px 3px 0 0;background:linear-gradient(90deg,var(--brand),var(--brand-xl));animation:underline .35s cubic-bezier(.4,0,.2,1)}
.navitem .badge{background:var(--coral);color:#fff;font-size:9px;font-weight:800;border-radius:999px;padding:1px 5px;line-height:1.5}
.navitem.news{color:var(--gold)} .navitem.news.active{color:var(--gold)}
.navitem.news.active::after{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.navitem.cam{color:var(--violet)} .navitem.cam.active{color:var(--violet)}
.navitem.cam.active::after{background:linear-gradient(90deg,var(--violet),#a99bf5)}
.navitem.demo{color:var(--teal-d)} .navitem.demo.active{color:var(--teal-d)}
.navitem.demo.active::after{background:linear-gradient(90deg,var(--teal),var(--teal-d))}

/* ALT-BAŞLIK ŞERİDİ */
.subnav{background:var(--bg2);border-bottom:1px solid var(--line);max-height:0;overflow:hidden;transition:.3s}
.subnav-in{max-width:1500px;margin:0 auto;padding:11px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.subnav .sn-lbl{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-right:4px}
.subpill{font-size:12.5px;font-weight:700;color:var(--soft);background:var(--paper);border:1px solid var(--line2);border-radius:999px;padding:6px 13px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:6px}
.subpill:hover{border-color:var(--brand-l);color:var(--brand-d);transform:translateY(-1px)}
.subpill.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 4px 12px rgba(63,140,191,.28)}
.subpill .sp-ic{font-size:13px}

main{max-width:1500px;margin:0 auto;padding:24px 24px 90px}
.view{display:none;animation:viewin .4s cubic-bezier(.4,0,.2,1)}
.view.show{display:block}
@keyframes viewin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin:6px 0 16px;flex-wrap:wrap}
.sec-head .st{display:flex;align-items:center;gap:14px}
.sec-ic{width:50px;height:50px;border-radius:15px;display:grid;place-items:center;font-size:24px;color:#fff;flex-shrink:0;box-shadow:var(--sh)}
.sec-head h2{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.4px;line-height:1.1}
.sec-head h2 .zeki-tag{font-size:11.5px;font-weight:800;background:var(--brand-bg);color:var(--brand-d);padding:3px 9px;border-radius:8px;margin-left:9px;vertical-align:middle;letter-spacing:.2px}
.sec-head .desc{font-size:13px;color:var(--soft);margin-top:5px;max-width:680px;font-weight:500}
.sec-head .he-right{font-size:12px;color:var(--muted);font-weight:600;text-align:right}

.blocktitle{display:flex;align-items:center;gap:11px;margin:24px 0 13px;position:relative}
.blocktitle .bt-bar{width:5px;height:22px;border-radius:4px;background:linear-gradient(180deg,var(--brand),var(--brand-xl));animation:growbar .6s cubic-bezier(.4,0,.2,1)}
.blocktitle h3{font-size:17px;font-weight:700;color:var(--ink2);letter-spacing:-.2px}
.blocktitle .bt-ic{font-size:18px}
.blocktitle .bt-line{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.blocktitle .bt-tag{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg2);border:1px solid var(--line);padding:3px 9px;border-radius:7px}

.grid{display:grid;gap:16px}
.g-2{grid-template-columns:repeat(2,1fr)} .g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)} .g-6{grid-template-columns:repeat(6,1fr)}
.g-32{grid-template-columns:1.6fr 1fr} .g-23{grid-template-columns:1fr 1.7fr}
@media(max-width:1180px){.g-4{grid-template-columns:repeat(2,1fr)}.g-6{grid-template-columns:repeat(3,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}.g-32,.g-23{grid-template-columns:1fr}}
@media(max-width:680px){.g-2,.g-3,.g-4,.g-6{grid-template-columns:1fr}}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh-sm);transition:transform .2s, box-shadow .2s, border-color .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:var(--line2)}
.card .ct{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--soft);margin-bottom:4px}
.card .ct .ci{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;font-size:14px;background:var(--brand-bg);color:var(--brand-d)}

.kpi{padding:16px 18px 14px}
.kpi .top{display:flex;align-items:center;justify-content:space-between}
.kpi .lbl{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--muted)}
.kpi .icn{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:17px}
.kpi .val{font-size:29px;font-weight:800;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-1px;margin:9px 0 2px;line-height:1}
.kpi .sub{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;flex-wrap:wrap}
.kpi .trend{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:7px;font-weight:800;font-size:11px}
.kpi .trend.up{background:var(--success-bg);color:var(--success)} .kpi .trend.dn{background:var(--danger-bg);color:var(--danger)} .kpi .trend.fl{background:var(--info-bg);color:var(--info)}
.kpi .sub .note{color:var(--muted)}
.kpi .spark{margin-top:11px;height:34px}
.kpi .accent{position:absolute;top:0;left:0;width:4px;height:100%}

/* BRİFİNG */
.brief{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dd) 100%);border:none;color:#fff;border-radius:var(--r-lg);padding:22px 24px;box-shadow:var(--sh-lg);position:relative;overflow:hidden}
.brief::before{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%)}
.brief::after{content:"";position:absolute;right:30px;bottom:-60px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(67,214,140,.22),transparent 70%)}
.brief .bh{display:flex;align-items:center;gap:13px;position:relative;z-index:2}
.brief .orb{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:22px;position:relative;flex-shrink:0}
.brief .orb::after{content:"";position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(255,255,255,.35);animation:ring2 2.6s infinite}
.brief .orb.speaking::after{animation:ring2 .7s infinite}
.brief .bh .who{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;opacity:.82;font-weight:700}
.brief .bh .greet{font-size:19px;font-weight:700}
.brief .listenbtn{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.18s}
.brief .listenbtn:hover{background:rgba(255,255,255,.28)}
.brief .btxt{font-size:15px;line-height:1.6;margin-top:14px;position:relative;z-index:2;min-height:46px;font-weight:500}
.brief .btxt .cursor{display:inline-block;width:2px;height:17px;background:#fff;vertical-align:middle;margin-left:1px;animation:blink 1s steps(1) infinite}
.brief .bchips{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;position:relative;z-index:2}
.brief .bchip{font-size:12px;font-weight:700;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:10px;display:flex;align-items:center;gap:7px}
.brief .bchip b{color:var(--gold-l)} .brief .bchip.crit b{color:#ffd2cc}

/* GROUNDED KÜNYE */
.kunye{background:linear-gradient(135deg,#fff,#f1f9fd);border:1px solid var(--line2)}
.kunye .ct .ci{background:var(--brand-bg);color:var(--brand-d)}
.kunye .kg{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.kunye .kf{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;flex:1;min-width:120px}
.kunye .kf .kfl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
.kunye .kf .kfv{font-size:14px;font-weight:800;color:var(--ink);margin-top:2px}
.kunye .src{font-size:11px;color:var(--brand-d);font-weight:700;margin-top:10px;display:flex;align-items:center;gap:6px}

/* AĞ */
.netwrap{position:relative;min-height:330px;display:grid;place-items:center}
.netwrap svg{width:100%;height:340px;overflow:visible}
.legend{display:flex;gap:13px;flex-wrap:wrap;margin-top:6px;font-size:11.5px;color:var(--soft);font-weight:600}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}

/* SÜREÇ HATTI */
.pipe{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:22px 20px 18px;box-shadow:var(--sh-sm);overflow-x:auto}
.pipe-track{display:flex;align-items:stretch;min-width:960px}
.pstage{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;padding:0 6px}
.pstage .pnode{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;font-size:23px;color:#fff;box-shadow:var(--sh);position:relative;z-index:3;transition:transform .25s;cursor:pointer}
.pstage .pnode:hover{transform:scale(1.12) translateY(-2px)}
.pstage .pnode .ringp{position:absolute;inset:-5px;border-radius:20px;border:2px solid currentColor;opacity:.35}
.pstage.live .pnode::after{content:"";position:absolute;inset:-6px;border-radius:20px;border:2.5px solid var(--lime-l);animation:ring3 1.8s infinite}
.pstage .pname{font-size:11.5px;font-weight:800;color:var(--ink2);margin-top:11px;text-align:center;line-height:1.25}
.pstage .pmeta{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:3px;text-align:center}
.pstage .pcount{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14px;color:var(--brand-d)}
.pconn{position:absolute;top:27px;left:60%;width:80%;height:3px;background:var(--line2);z-index:1;border-radius:3px;overflow:hidden}
.pconn .flow{position:absolute;top:0;left:0;height:100%;width:34%;border-radius:3px;background:linear-gradient(90deg,transparent,var(--brand-xl),transparent);animation:flow 2.4s linear infinite}
.pstage:last-child .pconn{display:none}
.pstage .pzeki{font-size:9.5px;font-weight:800;letter-spacing:.3px;color:var(--brand);background:var(--brand-bg);padding:2px 7px;border-radius:6px;margin-top:7px}

/* ONAY KUYRUĞU */
.appq{display:flex;flex-direction:column;gap:11px}
.appitem{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;transition:.2s;border-left:4px solid var(--brand)}
.appitem:hover{box-shadow:var(--sh-sm);transform:translateX(2px)}
.appitem.hi{border-left-color:var(--coral)} .appitem.md{border-left-color:var(--amber)}
.appitem .aic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:19px;flex-shrink:0;background:var(--brand-bg);color:var(--brand-d)}
.appitem.hi .aic{background:var(--danger-bg);color:var(--danger)} .appitem.md .aic{background:var(--warning-bg);color:var(--warning)}
.appitem .abody{flex:1;min-width:0}
.appitem .abody .at{font-size:13.5px;font-weight:700;color:var(--ink)}
.appitem .abody .ad{font-size:12px;color:var(--soft);margin-top:2px;font-weight:500}
.appitem .abody .atags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.appitem .atag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--paper);border:1px solid var(--line2);color:var(--soft)}
.appitem .atag.risk{background:var(--danger-bg);color:var(--danger);border-color:transparent}
.appitem .atag.val{background:var(--success-bg);color:var(--success);border-color:transparent}
.appitem .abtns{display:flex;gap:7px;flex-shrink:0}
.btn{border:none;border-radius:10px;padding:8px 14px;font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;transition:.16s}
.btn-ok{background:linear-gradient(135deg,var(--lime),#1f9c5f);color:#fff;box-shadow:0 4px 11px rgba(43,182,115,.3)}
.btn-ok:hover{transform:translateY(-1px);box-shadow:0 7px 16px rgba(43,182,115,.4)}
.btn-no{background:var(--paper);color:var(--soft);border:1px solid var(--line2)}
.btn-no:hover{color:var(--danger);border-color:var(--danger)}
.appitem.done{opacity:.55;border-left-color:var(--success)!important}
.appitem.done .abtns{display:none}
.appitem .doneflag{display:none;font-size:12px;font-weight:800;color:var(--success);align-items:center;gap:5px}
.appitem.done .doneflag{display:flex}

/* WHATIF */
.whatif{background:linear-gradient(150deg,#fff,#f1f9fd);border:1px solid var(--line2);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.whatif::before{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(217,154,31,.13),transparent 70%)}
.whatif .wq{font-size:13px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px}
.whatif .wbody{font-size:13px;color:var(--ink2);margin:9px 0 12px;font-weight:500;line-height:1.5}
.whatif .wval{font-size:25px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px}
.whatif .wval small{font-size:12px;color:var(--soft);font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0}
.whatif .wbar{height:7px;background:var(--line);border-radius:5px;margin-top:11px;overflow:hidden}
.whatif .wbar i{display:block;height:100%;border-radius:5px;width:0;transform-origin:left}
.whatif .wbar i.anim{animation:growX 1.2s cubic-bezier(.4,0,.2,1) both}

/* GELİR KAÇAĞI */
.leak{background:linear-gradient(135deg,#fff,#fdf6f0);border:1px solid #f3e3d4}
.leak .ct .ci{background:var(--warning-bg);color:var(--warning)}
.leakrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line2)}
.leakrow:last-child{border:none}
.leakrow .lk-l{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--ink2)}
.leakrow .lk-l .di{width:8px;height:8px;border-radius:50%}
.leakrow .lk-v{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;color:var(--warning)}
.leaktot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:2px solid var(--line2)}
.leaktot .t{font-size:13px;font-weight:800;color:var(--ink)} .leaktot .v{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:21px;color:var(--coral)}

/* INSIGHT KART */
.inscard .iv{font-size:23px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--ink);letter-spacing:-.5px;margin:4px 0 1px}
.inscard .il{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.inscard .id{font-size:12px;color:var(--soft);margin-top:7px;font-weight:500;line-height:1.45}
.statusline{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;margin-top:9px}
.statusline .sd{width:8px;height:8px;border-radius:50%}
.tag-risk{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:5px;letter-spacing:.2px}
.tag-risk.dusuk{background:var(--success-bg);color:var(--success)}
.tag-risk.orta{background:var(--warning-bg);color:var(--warning)}
.tag-risk.yuksek{background:var(--danger-bg);color:var(--danger)}

/* AKTİF İÇ SAYFA HERO */
.subhero{background:linear-gradient(135deg,var(--brand-soft),#fff);border:1px solid var(--line2);border-radius:var(--r);padding:18px 20px;display:flex;align-items:flex-start;gap:16px;margin-bottom:4px}
.subhero .shic{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:24px;background:linear-gradient(135deg,var(--brand),var(--brand-dd));color:#fff;flex-shrink:0;box-shadow:var(--sh-sm)}
.subhero .shb h3{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.subhero .shb p{font-size:13px;color:var(--soft);margin-top:5px;font-weight:500;line-height:1.55;max-width:760px}
.zekinow{display:flex;align-items:center;gap:11px;background:var(--brand-bg);border:1px solid var(--brand-l);border-radius:12px;padding:11px 15px;margin-top:14px}
.zekinow .zd{width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:15px;flex-shrink:0;animation:pulse 2.6s infinite}
.zekinow .zt{font-size:13px;color:var(--brand-dd);font-weight:600;line-height:1.45}
.zekinow .zt b{font-weight:800}
.zekinow .zspeak{margin-left:auto;background:var(--brand);color:#fff;border:none;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:15px;flex-shrink:0;transition:.16s}
.zekinow .zspeak:hover{background:var(--brand-dd)}

.prow{margin:10px 0}
.prow .pl{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--soft);margin-bottom:5px}
.prow .pl b{color:var(--ink2);font-family:'JetBrains Mono',monospace}
.ptrack{height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.ptrack i{display:block;height:100%;border-radius:6px;width:0;transform-origin:left}
.ptrack i.anim{animation:growX 1.1s cubic-bezier(.4,0,.2,1) both}

.feed{display:flex;flex-direction:column;max-height:340px;overflow-y:auto}
.feeditem{display:flex;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.feeditem .fdot{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:14px;flex-shrink:0}
.feeditem .fb{flex:1;min-width:0}
.feeditem .fb .ft{font-size:12.5px;font-weight:600;color:var(--ink2);line-height:1.4}
.feeditem .fb .ft b{font-weight:800;color:var(--brand-d)}
.feeditem .fb .fm{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:2px}

/* GRAFİK */
.chartbox{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.donut-leg{display:flex;flex-direction:column;gap:8px;flex:1;min-width:130px}
.donut-leg .dl{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--ink2)}
.donut-leg .dl .nm{display:flex;align-items:center;gap:7px} .donut-leg .dl i{width:11px;height:11px;border-radius:4px}
.donut-leg .dl b{font-family:'JetBrains Mono',monospace;font-weight:800}
.bars{display:flex;align-items:flex-end;gap:10px;height:158px;padding-top:18px}
.bar-c{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bar-c .bv{font-size:10.5px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--brand-d);opacity:0;margin-bottom:4px}
.bar-c .bv.in{animation:bvIn .5s ease both}
.bar-c .bw{width:80%;display:flex;align-items:flex-end;justify-content:center;gap:4px}
.bar-c .b{flex:1;max-width:46px;border-radius:6px 6px 3px 3px;min-height:3px;transform-origin:bottom}
.bar-c .b.anim{animation:barGrow .85s cubic-bezier(.4,0,.2,1) both}
.bar-c .b.g1{background:linear-gradient(180deg,var(--brand-l),var(--brand))}
.bar-c .b.g2{background:linear-gradient(180deg,var(--gold-l),var(--gold))}
.bar-c .bl{font-size:10px;color:var(--muted);font-weight:700;margin-top:7px;text-align:center}
.linewrap .lbls{display:flex;justify-content:space-between;margin-top:4px}
.linewrap .lbls span{font-size:10px;color:var(--muted);font-weight:700}

/* FUNNEL */
.funnel{display:flex;flex-direction:column;gap:7px}
.fstep{position:relative;height:46px;border-radius:10px;display:flex;align-items:center;padding:0 16px;color:#fff;font-weight:700;font-size:13px;box-shadow:var(--sh-sm);transform-origin:left;animation:funnelin .6s cubic-bezier(.4,0,.2,1) both}
.fstep .fn{flex:1} .fstep .fv{font-family:'JetBrains Mono',monospace;font-weight:800} .fstep .fr{font-size:11px;opacity:.85;margin-left:10px;font-weight:700}

/* KAMERA / GÖRÜ */
.camgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:1100px){.camgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.camgrid{grid-template-columns:1fr}}
.camtile{background:#0e2233;border:1px solid var(--line2);border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm);transition:.2s}
.camtile:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.camfeed{position:relative;height:200px;overflow:hidden;background:
  linear-gradient(120deg,#16344d 0%,#1d4763 45%,#11314a 100%)}
.camfeed.isg{background:linear-gradient(120deg,#173a52,#1f5170 50%,#143247)}
.camfeed.malzeme{background:linear-gradient(120deg,#1a3a30,#1f5246 50%,#15332b)}
.camfeed .floor{position:absolute;left:0;right:0;bottom:0;height:46%;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.10));border-top:1px solid rgba(255,255,255,.12)}
.camfeed .shelf{position:absolute;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);border-radius:3px}
.camfeed .scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(120,210,255,.7),transparent);animation:scan 3.4s linear infinite}
.camfeed .grain{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}
.camfeed .rec{position:absolute;top:9px;left:11px;display:flex;align-items:center;gap:6px;font-size:10px;font-weight:800;color:#fff;letter-spacing:.5px;z-index:5}
.camfeed .rec .rd{width:8px;height:8px;border-radius:50%;background:var(--coral);animation:pulse 1.3s infinite}
.camfeed .ts{position:absolute;top:9px;right:11px;font-size:10px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.8);z-index:5}
.camfeed .corner{position:absolute;width:16px;height:16px;border-color:rgba(255,255,255,.5);border-style:solid;z-index:4}
.bbox{position:absolute;border:2px solid var(--lime-l);border-radius:3px;z-index:3;box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.bbox.uyari{border-color:var(--amber)} .bbox.ihlal{border-color:var(--coral);animation:boxblink 1.1s infinite}
.bbox .blab{position:absolute;top:-17px;left:-2px;font-size:9.5px;font-weight:800;color:#062;background:var(--lime-l);padding:1px 5px;border-radius:3px;white-space:nowrap}
.bbox.uyari .blab{background:var(--amber);color:#3a2600} .bbox.ihlal .blab{background:var(--coral);color:#fff}
.camcap{padding:11px 13px;background:#102a40}
.camcap .cn{font-size:13px;font-weight:700;color:#eaf4fb;display:flex;align-items:center;justify-content:space-between}
.camcap .cn .cstat{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:6px}
.cstat.ok{background:rgba(67,214,140,.2);color:#7ef0b3} .cstat.uyari{background:rgba(245,166,35,.22);color:#ffd591} .cstat.ihlal{background:rgba(255,107,94,.22);color:#ffb3ab}
.camcap .cl{font-size:11px;color:#8fb0c8;font-weight:500;margin-top:3px}

/* RPA TİYATROSU */
.rpa-wrap{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
@media(max-width:980px){.rpa-wrap{grid-template-columns:1fr}}
.appwin{background:#fff;border:1px solid var(--line2);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.appwin .winbar{height:38px;background:linear-gradient(180deg,#f2f6f9,#e8eef3);border-bottom:1px solid var(--line2);display:flex;align-items:center;padding:0 13px;gap:8px}
.appwin .winbar .dots{display:flex;gap:6px} .appwin .winbar .dots i{width:11px;height:11px;border-radius:50%}
.appwin .winbar .t{font-size:12px;font-weight:700;color:var(--ink2);margin-left:6px}
.appwin .winbar .url{margin-left:auto;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:6px;padding:3px 9px}
.appbody{padding:18px;min-height:300px}
.appbody h4{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.formrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.formrow .fl{font-size:12px;font-weight:700;color:var(--soft);width:130px;flex-shrink:0}
.formrow .fi{flex:1;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--ink);min-height:36px;transition:.25s}
.formrow .fi.filling{background:var(--brand-bg);border-color:var(--brand-l)}
.formrow .fi.done{background:#fff}
.formrow .fi .car{display:inline-block;width:1.5px;height:14px;background:var(--brand);vertical-align:middle;animation:blink 1s steps(1) infinite}
.checkbar{margin-top:16px;padding:11px 14px;border-radius:10px;background:var(--bg2);border:1px solid var(--line);font-size:12.5px;font-weight:700;color:var(--soft);display:flex;align-items:center;gap:9px;transition:.3s}
.checkbar.pass{background:var(--success-bg);color:var(--success);border-color:transparent}
.checkbar.gate{background:var(--warning-bg);color:var(--warning);border-color:transparent}
.checkbar.reject{background:var(--danger-bg);color:var(--danger);border-color:transparent}
.gatebox{margin-top:14px;border:2px dashed var(--warning);background:var(--warning-bg);border-radius:13px;padding:15px;display:none}
.gatebox.show{display:block;animation:viewin .3s}
.gatebox .gt{font-size:13.5px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
.gatebox .gd{font-size:12px;color:var(--ink2);margin:7px 0 12px;font-weight:500}
.gatebox .gbtns{display:flex;gap:9px}
.rpa-side{display:flex;flex-direction:column;gap:14px}
.rpa-narr{background:linear-gradient(135deg,var(--brand),var(--brand-dd));color:#fff;border-radius:14px;padding:16px;box-shadow:var(--sh)}
.rpa-narr .nh{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.rpa-narr .orb{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:17px;position:relative}
.rpa-narr .orb.speaking::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(255,255,255,.5);animation:ring2 .7s infinite}
.rpa-narr .nh b{font-size:14px} .rpa-narr .nh span{font-size:10.5px;opacity:.8;display:block}
.rpa-narr .ntxt{font-size:13.5px;line-height:1.55;font-weight:500;min-height:42px}
.audit{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--sh-sm)}
.audit .ct{margin-bottom:8px}
.auditlog{display:flex;flex-direction:column;gap:7px;max-height:230px;overflow-y:auto;font-family:'JetBrains Mono',monospace}
.alog{font-size:11px;color:var(--soft);display:flex;gap:8px;padding:6px 8px;background:var(--bg2);border-radius:7px;border-left:3px solid var(--line2);animation:feedin .4s}
.alog.ok{border-left-color:var(--success)} .alog.gate{border-left-color:var(--warning)} .alog.write{border-left-color:var(--brand)} .alog.reject{border-left-color:var(--danger)}
.alog .at{color:var(--muted);flex-shrink:0}
.demo-pick{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.demo-card{flex:1;min-width:240px;background:var(--paper);border:1.5px solid var(--line2);border-radius:13px;padding:15px;cursor:pointer;transition:.18s}
.demo-card:hover{border-color:var(--brand-l);transform:translateY(-2px);box-shadow:var(--sh-sm)}
.demo-card.active{border-color:var(--brand);background:var(--brand-soft);box-shadow:0 6px 18px rgba(63,140,191,.18)}
.demo-card .dch{display:flex;align-items:center;gap:10px}
.demo-card .dci{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand-dd))}
.demo-card .dct{font-size:14px;font-weight:800;color:var(--ink)}
.demo-card .dcc{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;background:var(--teal-bg);color:var(--teal-d)}
.demo-card .dcd{font-size:11.5px;color:var(--soft);margin-top:9px;font-weight:500;line-height:1.5}
.runbtn{background:linear-gradient(135deg,var(--lime),#1f9c5f);color:#fff;border:none;border-radius:11px;padding:11px 20px;font:inherit;font-weight:800;font-size:13.5px;cursor:pointer;box-shadow:0 6px 16px rgba(43,182,115,.3);transition:.18s;display:inline-flex;align-items:center;gap:9px}
.runbtn:hover{transform:translateY(-1px);box-shadow:0 9px 20px rgba(43,182,115,.42)}
.runbtn:disabled{opacity:.5;cursor:default;transform:none}
.parklist{display:flex;flex-direction:column;gap:8px}
.parkrow{display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;font-size:12.5px;transition:.25s}
.parkrow .pdot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0}
.parkrow.scan{background:var(--brand-bg);border-color:var(--brand-l)}
.parkrow.hit{background:var(--danger-bg);border-color:var(--coral)} .parkrow.hit .pdot{background:var(--coral)}
.parkrow.ok .pdot{background:var(--success)}
.parkrow .pn{font-weight:700;color:var(--ink2)} .parkrow .pm{margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--soft)}

/* HABERLER */
.newscard{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-sm);transition:.2s;display:flex;flex-direction:column}
.newscard:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.newscard .nhead{height:84px;display:flex;align-items:flex-end;padding:13px 15px;position:relative;overflow:hidden}
.newscard .nhead::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.18) 50%,transparent 60%);transform:translateX(-100%);animation:sheen 6s ease-in-out infinite}
.newscard .nhead .ntag{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:rgba(255,255,255,.9);color:var(--ink2);padding:3px 9px;border-radius:7px;position:relative;z-index:2}
.newscard .nhead .nemoji{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:34px;opacity:.92;z-index:2}
.newscard .nbody{padding:14px 15px 16px;flex:1;display:flex;flex-direction:column}
.newscard .nbody h4{font-size:14px;font-weight:700;color:var(--ink);line-height:1.35}
.newscard .nbody p{font-size:12px;color:var(--soft);margin-top:7px;font-weight:500;line-height:1.5;flex:1}
.newscard .nbody .nmeta{display:flex;align-items:center;justify-content:space-between;margin-top:11px;font-size:11px;color:var(--muted);font-weight:600}
.newscard .nbody .nmeta .nsrc{color:var(--brand-d);font-weight:700}
.quotecard{background:linear-gradient(135deg,var(--brand),var(--brand-dd));color:#fff;border-radius:var(--r-lg);padding:24px 26px;position:relative;overflow:hidden;box-shadow:var(--sh-lg)}
.quotecard.gold{background:linear-gradient(135deg,var(--gold),#b87d14)} .quotecard.violet{background:linear-gradient(135deg,var(--violet),#5847c4)}
.quotecard.teal{background:linear-gradient(135deg,var(--teal),var(--teal-d))}
.quotecard .qmark{position:absolute;right:18px;top:-10px;font-size:120px;font-family:'Fraunces',serif;opacity:.14;line-height:1}
.quotecard .qt{font-family:'Fraunces',serif;font-size:20px;font-weight:600;line-height:1.4;position:relative;z-index:2}
.quotecard .qa{margin-top:15px;font-size:13px;font-weight:700;opacity:.92;position:relative;z-index:2}
.quotecard .qa span{opacity:.7;font-weight:500}
.quoteband{background:linear-gradient(90deg,var(--ink),var(--brand-dd));color:#fff;overflow:hidden;position:relative;border-radius:var(--r);margin-top:22px;box-shadow:var(--sh)}
.quoteband .qtrack{display:flex;gap:60px;padding:14px 0;white-space:nowrap;animation:marquee 42s linear infinite;width:max-content}
.quoteband .qi{font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:10px}
.quoteband .qi .qd{color:var(--gold-l);font-size:16px}
.quoteband:hover .qtrack{animation-play-state:paused}
.persuade{background:var(--brand-soft);border:1px dashed var(--brand-l);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:13px;margin-bottom:6px}
.persuade .pi{font-size:22px;flex-shrink:0;color:var(--brand-d)}
.persuade .pt{font-size:14px;font-weight:600;color:var(--brand-dd);font-style:italic}
.persuade .pt b{font-weight:800;font-style:normal}

.row{display:flex;align-items:center;gap:10px} .between{justify-content:space-between}
.tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--brand-bg);color:var(--brand-d)}
.muted{color:var(--muted)} .spark{display:block;width:100%}
.reveal{opacity:0} .reveal.in{animation:revealIn .6s cubic-bezier(.4,0,.2,1) both}
.mt{margin-top:16px} .note-ai{font-size:11.5px;color:var(--brand-d);font-weight:600;font-style:italic;margin-top:9px;display:flex;align-items:center;gap:6px}

/* ZEKİ YAN PANEL */
.zeki-panel{position:fixed;right:-380px;top:0;bottom:0;width:360px;background:var(--paper);box-shadow:-18px 0 50px rgba(14,53,80,.18);z-index:130;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--line)}
.zeki-panel.open{right:0}
.zeki-panel .zh{background:linear-gradient(135deg,var(--brand),var(--brand-dd));color:#fff;padding:18px 20px;display:flex;align-items:center;gap:12px}
.zeki-panel .zh .orb{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:20px;position:relative}
.zeki-panel .zh .orb.speaking::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(255,255,255,.5);animation:ring2 .7s infinite}
.zeki-panel .zh h4{font-size:16px;font-weight:700} .zeki-panel .zh p{font-size:11px;opacity:.85;font-weight:600}
.zeki-panel .zh .x{margin-left:auto;cursor:pointer;font-size:22px;opacity:.85}
.zeki-panel .zbody{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.zmsg{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:12px 14px;font-size:13px;color:var(--ink2);line-height:1.5;font-weight:500}
.zmsg.me{background:var(--brand);color:#fff;align-self:flex-end;border:none;max-width:82%}
.zmsg b{color:var(--brand-d);font-weight:800} .zmsg.me b{color:#fff}
.zquick{display:flex;flex-wrap:wrap;gap:7px;padding:14px 18px;border-top:1px solid var(--line)}
.zquick .qb{font-size:12px;font-weight:700;color:var(--brand-d);background:var(--brand-bg);border:none;border-radius:9px;padding:7px 11px;cursor:pointer;transition:.15s}
.zquick .qb:hover{background:var(--brand);color:#fff}
.scrim{position:fixed;inset:0;background:rgba(14,53,80,.3);z-index:125;opacity:0;pointer-events:none;transition:.3s}
.scrim.show{opacity:1;pointer-events:auto}

.toast-msg{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-lg);display:flex;align-items:center;gap:10px;z-index:200;opacity:0;pointer-events:none;transition:.3s}
.toast-msg.show{opacity:1;transform:translateX(-50%) translateY(0)}
.tip-pop{position:fixed;transform:translate(-50%,-100%);background:var(--ink);color:#fff;font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:8px;pointer-events:none;opacity:0;transition:.15s;z-index:210;white-space:nowrap;max-width:280px}
.tip-pop.show{opacity:1}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(67,214,140,.6)}70%{box-shadow:0 0 0 8px rgba(67,214,140,0)}100%{box-shadow:0 0 0 0 rgba(67,214,140,0)}}
@keyframes ring2{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.5);opacity:0}}
@keyframes ring3{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.4);opacity:0}}
@keyframes sheen{0%,75%{transform:translateX(-120%)}88%,100%{transform:translateX(220%)}}
@keyframes flow{0%{left:-34%}100%{left:104%}}
@keyframes scan{0%{top:-2px}100%{top:100%}}
@keyframes boxblink{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes growbar{from{height:0;opacity:0}to{opacity:1}}
@keyframes underline{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes feedin{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
@keyframes funnelin{from{transform:scaleX(.3);opacity:0}to{transform:scaleX(1);opacity:1}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes bvIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes revealIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}.reveal{opacity:1!important;transform:none!important}}
@media print{.reveal{opacity:1!important}.topbar,.mainnav,.subnav{position:static}.demo-badge{position:static}}
</style>

function lineChart(data,{w=460,h=150,iki=false}={}){

  const mk=key=>data.map((d,i)=>[px(i),py(d[key])]);
  const pathOf=pts=>pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const p1=mk('v'); const id='ln'+Math.floor(performance.now()*1000%1e6);

  svg+=`<path d="${pathOf(p1)} L${px(data.length-1)} ${h-22} L20 ${h-22} Z" fill="url(#${id})"/>`;

function observeReveals(root=document){

function loadVoices(){
  const vs=(window.speechSynthesis?speechSynthesis.getVoices():[])||[];
  const tr=vs.filter(v=>/tr[-_]?TR/i.test(v.lang)||/turk|türk/i.test(v.name||''));
  const score=v=>{const n=(v.name||'').toLowerCase();let s=0;
    if(/google/.test(n))s+=100;                       // Google Türkçe = en doğal
    if(/natural|neural|online/.test(n))s+=60;          // Microsoft Online (Natural)
    if(/(emel|tolga|filiz|sedef|yelda|ahmet)/.test(n))s+=20;
    if(/tr[-_]?TR/i.test(v.lang))s+=10;
    if(v.localService===false)s+=5;
    return s;};
  tr.sort((a,b)=>score(b)-score(a));
  trVoice=tr[0]||vs.find(v=>/tr[-_]?TR/i.test(v.lang))||null;
}

function audit(line,cls){const al=qs('#auditLog');if(!al)return;const t=new Date();const ts=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');const r=el('div','alog '+(cls||''),`<span class="at">${ts}</span> ${line}`);al.appendChild(r);al.scrollTop=al.scrollHeight;}

async function runDemo(demo){
  if(demoRunning)return; demoRunning=true;
  qs('#runBtn').disabled=true; qs('#runBtn').style.display='none';
  const ab=qs('#appBody'); let fiIdx=0;
  const wait=ms=>new Promise(r=>setTimeout(r,reduced?60:ms));
  for(const a of demo.adimlar){
    narr(a.narration);
    if(a.tip==='komut'){audit('Sesli komut alındı: '+(a.deger||a.metin),'');}
    else if(a.tip==='oku'){audit('Kaynak okundu: '+(a.metin||'').slice(0,70),'');}
    else if(a.tip==='yaz'){
      if(demo.kanal==='RPA'&&a.alan){const fi=qs('#fi'+fiIdx);if(fi){fi.classList.add('filling');await typeInto(fi,a.deger||a.metin);fi.classList.remove('filling');fi.classList.add('done');}fiIdx++;audit('Alan yazıldı: '+a.alan+' = '+(a.deger||''),'write');}
      else{audit('Yazım hazırlandı: '+(a.metin||'').slice(0,60),'write');}
    }
    else if(a.tip==='onay'){
      const cb=qs('#checkBar');if(cb){cb.className='checkbar gate';cb.innerHTML='⏸️ ONAY KAPISI — yüksek riskli yazım, kararınız bekleniyor';}
      audit('ONAY KAPISI: '+(a.metin||'yüksek riskli yazım').slice(0,60),'gate');
      const ok=await onayKapisi(a);
      if(!ok){narr('Reddettiniz. Hiçbir şey yazılmadı, sistem olduğu gibi kaldı.');audit('REDDEDİLDİ — dış sisteme hiçbir yazım yapılmadı','reject');if(cb){cb.className='checkbar reject';cb.innerHTML='⛔ Reddedildi — yazım iptal';}demoBitir();return;}
      if(cb){cb.className='checkbar pass';cb.innerHTML='✓ Onaylandı — yazıma devam';}
      audit('ONAY ALINDI (insan) — yazıma devam','ok');
    }
    else if(a.tip==='audit'){audit((a.metin||'Denetim izi bırakıldı').slice(0,70),'ok');}
    else if(a.tip==='red'){audit('RET: '+(a.metin||'').slice(0,60),'reject');}
    if(demo.kanal==='API'&&a.tip==='oku'){await scanPark();}
    await wait(a.tip==='onay'?300:1500);
  }
  const cb=qs('#checkBar');if(cb&&!cb.classList.contains('reject')){cb.className='checkbar pass';cb.innerHTML='✓ İşlem tamamlandı, geri-okuma + audit tamam';}
  narr('İşlem tamam. Yazdığımı geri okudum, denetim izini bıraktım. Karar sizindi, uygulamayı ben yaptım.');
  demoBitir();
}

function typeInto(node,text){return new Promise(res=>{if(reduced){node.textContent=text;res();return;}let i=0;node.innerHTML='<span class="car"></span>';(function st(){if(i<=text.length){node.innerHTML=text.slice(0,i)+'<span class="car"></span>';i++;setTimeout(st,28);}else{node.textContent=text;res();}})();});}
function onayKapisi(a){
  return new Promise(res=>{
    const gb=qs('#gateBox');if(!gb){res(true);return;}
    gb.className='gatebox show';
    gb.innerHTML=`<div class="gt">⏸️ Onayınız Bekleniyor</div><div class="gd">${a.metin||'Yüksek riskli dış-yazma. Onaylarsanız Akıllı Asistan devam eder, reddederseniz hiçbir şey yazılmaz.'}</div><div class="gbtns"><button class="btn btn-ok" id="gOk">✓ Onayla</button><button class="btn btn-no" id="gNo">✗ Reddet</button></div>`;

    qs('#gNo').onclick=()=>{gb.className='gatebox';res(false);};

}
async function scanPark(){

function zekiAsk(i){const qa=(PANEL.news&&PANEL.news.zekiQA)||[];const k=qa[i];if(!k)return;addZ(k.q,true);setTimeout(()=>{addZ(k.a,false);const plain=k.a.replace(/<[^>]+>/g,'');zekiSpeak(plain);},420);}

/* ════ BAŞLAT ════ */
function clock(){const now=new Date();const gun=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'][now.getDay()];const ay=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'][now.getMonth()];qs('#dToday').textContent=`${now.getDate()} ${ay} ${now.getFullYear()}`;qs('#dClock').textContent=`${gun} · ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;}
function renderKpiMini(){qs('#kpiMini').innerHTML=D.kpiMini.map(k=>`<div class="km"><span class="l">${k.l}</span><span class="v">${k.v}<small class="${k.up?'':'dn'}">${k.d}</small></span></div>`).join('');}
function liveJitter(){if(reduced)return;setInterval(()=>{const km=qsa('#kpiMini .km .v');if(km[0]){const base=62.4+(performance.now()/1000%6-3)*0.05;km[0].firstChild.textContent='₺'+base.toFixed(1)+'M';}},3200);}
window.addEventListener('DOMContentLoaded',()=>{
  renderKpiMini();renderNav();clock();initTooltips();liveJitter();setInterval(clock,30000);
  const start=(location.hash||'').replace('#','');
  goView(NAV.some(n=>n.id===start)?start:'komuta');
});
window.addEventListener('hashchange',()=>{const h=(location.hash||'').replace('#','');if(NAV.some(n=>n.id===h)&&h!==aktif)goView(h);});
window.goView=goView;window.setAlt=setAlt;window.openZeki=openZeki;window.closeZeki=closeZeki;window.zekiAsk=zekiAsk;window.toggleSes=toggleSes;window.zekiSpeak=zekiSpeak;window.BRIEF_TXT=BRIEF_TXT;
</script>
